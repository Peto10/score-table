<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Score Display</title>
    <link rel="stylesheet" href="/static/app.css?v=31" />
    <script defer src="/static/display_sse.js?v=6"></script>
  </head>
  <body class="displayBody">
    <div id="idleMessage" class="idleMessage {{if .HasActive}}isHidden{{end}}">
      <div class="idleTitle">No active match</div>
    </div>
    <div id="scoreboard" class="scoreboard {{if not .HasActive}}isHidden{{end}}">
      <div id="displayTimer" class="displayTimer isHidden"></div>
      <div class="displayFrame">
        <div class="displaySide displayLeft">
          <div id="team1Name" class="teamName"></div>
          <div id="team1Score" class="scoreNumber">0</div>
        </div>
        <div class="displaySide displayRight">
          <div id="team2Name" class="teamName"></div>
          <div id="team2Score" class="scoreNumber">0</div>
        </div>
      </div>
    </div>
  </body>
</html>
